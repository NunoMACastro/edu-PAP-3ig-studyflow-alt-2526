name: studyflow-local

services:
  mongo:
    image: mongo:8.0.23
    command:
      - mongod
      - --replSet
      - studyflow-rs
      - --bind_ip_all
      - --port
      - "27017"
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./infra/mongo/ensure-replica-set.js:/opt/studyflow/ensure-replica-set.js:ro
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - mongodb://127.0.0.1:27017/admin?directConnection=true
        - --file
        - /opt/studyflow/ensure-replica-set.js
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  redis:
    image: redis:7.4.9-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -n
        - "1"
        - ping
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  mongo-data:
  redis-data:
